name: Build PeppyFonts

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/workflows/build-fonts.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install fonttools cu2qu brotli

      - name: Build fonts
        run: python scripts/build.py

      - name: List output
        run: |
          echo "--- Built fonts ---"
          ls -lh fonts/*.ttf 2>/dev/null || echo "No fonts built yet (scaffold phase)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: peppy-fonts
          path: fonts/*.ttf
          if-no-files-found: warn

      - name: Commit fonts
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fonts/*.ttf
          git diff --cached --quiet && echo "No font changes" || \
            (git commit -m "build: update PeppyFont files [skip ci]" && git push)
