name: Build PeppyFonts

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/workflows/build-fonts.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install fonttools cu2qu brotli

      - name: Build fonts
        run: python scripts/build.py

      - name: List output
        run: |
          echo "--- Built fonts ---"
          ls -lh fonts/*.ttf 2>/dev/null || echo "No fonts built yet (scaffold phase)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: peppy-fonts
          path: fonts/*.ttf
          if-no-files-found: warn

      - name: Commit fonts
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fonts/*.ttf
          if git diff --cached --quiet; then
            echo "No font changes"
            exit 0
          fi
          git commit -m "build: update PeppyFont files [skip ci]"
          # Resilient push: an unrelated push to main during the build (docs, config,
          # etc.) would otherwise make this a non-fast-forward and fail the run.
          # Rebase the font commit onto the latest main and retry a few times.
          for attempt in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then
              echo "Pushed font updates on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt failed (likely concurrent push); retrying..."
            sleep 5
          done
          echo "ERROR: failed to push font updates after 5 attempts"
          exit 1
